services:
  portal:
    build:
      context: ./apps/portal
      dockerfile: Dockerfile
    container_name: asafarim-portal
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORTAL_URL=https://portal-qa.asafarim.com
      - CONTENT_GENERATOR_URL=${CONTENT_GENERATOR_URL:-https://content-generator-qa.asafarim.com}
      - NEXT_PUBLIC_CONTENT_GENERATOR_URL=${NEXT_PUBLIC_CONTENT_GENERATOR_URL:-https://content-generator-qa.asafarim.com}
    networks:
      - asafarim-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  content-generator:
    build:
      context: .
      dockerfile: ./apps/content-generator/Dockerfile
      args:
        NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-}
    container_name: asafarim-content-generator
    restart: unless-stopped
    ports:
      - "3002:3001"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_BASE_PATH=${NEXT_PUBLIC_BASE_PATH:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL}
    networks:
      - asafarim-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Future services go here:
  # api-gateway:
  #   build: ./services/api-gateway
  #   ...
  # identity-service:
  #   build: ./services/identity-service
  #   ...

networks:
  asafarim-net:
    driver: bridge

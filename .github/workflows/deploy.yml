name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VPS_HOST: ${{ secrets.VPS_HOST }}
  VPS_USER: ${{ secrets.VPS_USER }}
  DEPLOY_PATH: /var/repos/asafarim-digital
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Validate deployment secrets
        run: |
          test -n "${{ secrets.VPS_HOST }}" || (echo "VPS_HOST is not set" && exit 1)
          test -n "${{ secrets.VPS_USER }}" || (echo "VPS_USER is not set" && exit 1)
          test -n "${{ secrets.VPS_SSH_KEY }}" || (echo "VPS_SSH_KEY is not set" && exit 1)

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -T 15 -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to VPS
        run: |
          set -euo pipefail
          SSH_OPTS="-o StrictHostKeyChecking=accept-new -o ConnectTimeout=20"

          echo "Checking SSH connectivity to VPS..."
          SSH_READY=false
          for attempt in 1 2 3; do
            if ssh -v ${SSH_OPTS} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "echo ssh-ok"; then
              SSH_READY=true
              echo "SSH connectivity confirmed on attempt ${attempt}."
              break
            fi
            echo "SSH preflight failed (attempt ${attempt}/3). Retrying in 10s..."
            sleep 10
          done

          if [ "$SSH_READY" != "true" ]; then
            echo "Unable to reach VPS over SSH after 3 attempts. Check VPS status/firewall/network."
            exit 1
          fi

          # Sync files to VPS
          RSYNC_DONE=false
          for attempt in 1 2 3; do
            if rsync -e "ssh ${SSH_OPTS}" -avz --delete \
              --exclude='.git' \
              --exclude='node_modules' \
              --exclude='.next' \
              --exclude='.turbo' \
              --exclude='docker-compose.override.yml' \
              --exclude='.env' \
              --exclude='.env.*' \
              --exclude='*/.env' \
              --exclude='*/.env.*' \
              --exclude='apps/*/.env' \
              --exclude='apps/*/.env.*' \
              --filter='P .env' \
              --filter='P .env.*' \
              --filter='P */.env' \
              --filter='P */.env.*' \
              ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ env.DEPLOY_PATH }}/; then
              RSYNC_DONE=true
              echo "Rsync completed on attempt ${attempt}."
              break
            fi
            echo "Rsync failed (attempt ${attempt}/3). Retrying in 10s..."
            sleep 10
          done

          if [ "$RSYNC_DONE" != "true" ]; then
            echo "Rsync failed after 3 attempts. Check VPS SSH reachability and disk/network status."
            exit 1
          fi

          # Build and restart on VPS
          ssh ${SSH_OPTS} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            set -euo pipefail
            cd /var/repos/asafarim-digital
            sudo install -m 644 infra/nginx/portal-qa.asafarim.com.conf /etc/nginx/sites-available/portal-qa.asafarim.com.conf
            sudo install -m 644 infra/nginx/content-generator-qa.asafarim.com.conf /etc/nginx/sites-available/content-generator-qa.asafarim.com.conf
            sudo ln -sf /etc/nginx/sites-available/portal-qa.asafarim.com.conf /etc/nginx/sites-enabled/portal-qa.asafarim.com.conf
            sudo ln -sf /etc/nginx/sites-available/content-generator-qa.asafarim.com.conf /etc/nginx/sites-enabled/content-generator-qa.asafarim.com.conf
            sudo nginx -t
            sudo systemctl reload nginx
            docker compose up -d postgres
            docker compose rm -f db-migrate || true
            docker compose build portal content-generator
            docker compose up -d db-migrate
            echo "Waiting for db-migrate to complete..."
            timeout 300 sh -c 'until [ "$(docker inspect --format={{.State.Status}} asafarim-db-migrate 2>/dev/null)" = "exited" ]; do sleep 3; done'
            MIGRATE_EXIT=$(docker inspect --format={{.State.ExitCode}} asafarim-db-migrate 2>/dev/null || echo 1)
            if [ "$MIGRATE_EXIT" != "0" ]; then
              echo "db-migrate failed!"
              docker logs asafarim-db-migrate --tail=50
              exit 1
            fi

            echo "Checking whether initial seed is required..."
            SITE_CONTENT_COUNT=$(docker compose run --rm db-migrate sh -lc 'node -e '\''const { PrismaClient } = require("@prisma/client"); const prisma = new PrismaClient(); (async () => { const count = await prisma.siteContent.count(); console.log(count); await prisma.$disconnect(); })().catch(async (error) => { console.error(error); try { await prisma.$disconnect(); } catch {} process.exit(1); });'\''' 2>/tmp/site-content-count.err | tr -d '[:space:]' || true)
            if ! [[ "$SITE_CONTENT_COUNT" =~ ^[0-9]+$ ]]; then
              echo "Could not determine SiteContent count. Skipping seed check."
              if [ -s /tmp/site-content-count.err ]; then
                tail -n 50 /tmp/site-content-count.err
              fi
              SITE_CONTENT_COUNT=1
            fi
            if [ "${SITE_CONTENT_COUNT:-0}" = "0" ]; then
              echo "SiteContent is empty. Running initial seed..."
              docker compose run --rm db-migrate sh -lc "npm run db:seed"
            else
              echo "SiteContent already present (${SITE_CONTENT_COUNT}). Skipping seed."
            fi

            docker compose up -d --force-recreate portal content-generator
            docker system prune -f
            echo "Deployment complete!"
            docker compose ps
          ENDSSH

      - name: Verify deployment
        run: |
          set -euo pipefail
          SSH_OPTS="-o StrictHostKeyChecking=accept-new -o ConnectTimeout=20"
          ssh ${SSH_OPTS} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDVERIFY'
            echo "Waiting for portal and content-generator to become healthy..."
            RETRIES=18
            for i in $(seq 1 $RETRIES); do
              PORTAL_OK=false
              CG_OK=false
              curl -sf http://localhost:3000/api/health > /dev/null 2>&1 && PORTAL_OK=true
              curl -sf http://localhost:3002/api/health > /dev/null 2>&1 && CG_OK=true
              if [ "$PORTAL_OK" = true ] && [ "$CG_OK" = true ]; then
                echo "Both services healthy after ${i}x5s"
                exit 0
              fi
              echo "Attempt $i/$RETRIES: portal=$PORTAL_OK cg=$CG_OK — waiting 5s..."
              sleep 5
            done
            echo "=== Portal logs ==="
            docker logs asafarim-portal --tail=50
            echo "=== Content-generator logs ==="
            docker logs asafarim-content-generator --tail=50
            echo "Health check failed after 90s"
            exit 1
          ENDVERIFY
